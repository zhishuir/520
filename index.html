<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>520 · 爱心玫瑰星尘 | 浪漫歌词滚动</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', cursive, sans-serif;
            background-color: #0a0718;
            touch-action: none;
        }
        /* 歌词滚动区域 - 优雅半透明，位于底部偏上，不影响爱心交互 */
        .lyrics-container {
            position: fixed;
            bottom: 18%;
            left: 0;
            width: 100%;
            z-index: 30;
            pointer-events: none;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .lyrics-line {
            display: inline-block;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 8px 24px;
            color: #ffeef4;
            font-size: clamp(14px, 4.5vw, 20px);
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 80, 120, 0.3);
            border-left: 3px solid #ff99bb;
            border-right: 3px solid #ff99bb;
            transition: opacity 0.6s ease, transform 0.4s ease;
            white-space: nowrap;
            max-width: 90vw;
            overflow-x: auto;
            white-space: normal;
            word-break: keep-all;
            line-height: 1.4;
        }
        /* 手机适配换行 */
        @media (max-width: 600px) {
            .lyrics-line {
                font-size: 16px;
                padding: 6px 18px;
                max-width: 85vw;
            }
            .lyrics-container {
                bottom: 15%;
            }
        }
        /* 主标题 520 */
        .title-520 {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            font-size: clamp(20px, 6vw, 32px);
            font-weight: bold;
            background: linear-gradient(135deg, #ff99bb, #ff6680);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,105,130,0.5);
            letter-spacing: 4px;
        }
        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 100, 130, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 200, 210, 0.6);
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(255,80,120,0.3);
        }
        .music-control i {
            font-size: 24px;
            color: #ffeef4;
        }
        .music-control:active {
            transform: scale(0.92);
        }
        .info-tip {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,220,230,0.6);
            font-size: 11px;
            z-index: 20;
            background: rgba(0,0,0,0.2);
            width: fit-content;
            margin: 0 auto;
            padding: 3px 12px;
            border-radius: 20px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="title-520">✨ 123 · 520快乐 ✨</div>
    <div class="lyrics-container" id="lyricsContainer">
        <div class="lyrics-line" id="lyricsText">🌟 你一闪一闪的，照亮了我的世界 🌟</div>
    </div>
    <div class="music-control" id="musicBtn">
        <i class="fas fa-heartbeat"></i>
    </div>
    <div class="info-tip">💫 手指拖拽旋转爱心 | 双指缩放 | 歌词自动滚动 💫</div>

    <audio id="bgm" loop preload="auto">
        <source src="1.mp3" type="audio/mpeg">
        <source src="1.ogg" type="audio/ogg">
    </audio>

    <!-- 引入 Three.js 核心库和扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 初始化场景、相机、渲染器 (性能优化) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0718);
        scene.fog = new THREE.FogExp2(0x0a0718, 0.012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // 后期特效 Bloom 柔和光晕
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.2, 0.6);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.45;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // 环境光 + 补光
        const ambientLight = new THREE.AmbientLight(0x332233, 0.6);
        scene.add(ambientLight);
        const backLight = new THREE.PointLight(0xff6699, 0.5);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xff88aa, 0.4);
        fillLight.position.set(1, 1.5, 2);
        scene.add(fillLight);

        // 星空背景粒子
        const starCount = 800;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 30;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffaacc, size: 0.08, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- 核心: 心形粒子系统 (玫瑰色爱心，立体蓬松)---
        const particleCount = 3800;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        const colorPalette = [
            new THREE.Color(1, 0.45, 0.65),
            new THREE.Color(1, 0.55, 0.75),
            new THREE.Color(1, 0.35, 0.55),
            new THREE.Color(1, 0.7, 0.85),
            new THREE.Color(1, 0.85, 0.9)
        ];
        
        function heartPoint(t, scale = 0.12) {
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            const zRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            return { x: xRaw * scale, z: zRaw * scale };
        }
        
        for (let i = 0; i < particleCount; i++) {
            let t = Math.random() * Math.PI * 2;
            let radialFactor = 0.7 + Math.random() * 0.8;
            let base = heartPoint(t, 0.115 * radialFactor);
            let y = (Math.random() - 0.5) * 2.4;
            let heightScale = 1 - Math.abs(y) * 0.18;
            heightScale = Math.max(0.65, heightScale);
            let x = base.x * heightScale + (Math.random() - 0.5) * 0.12;
            let z = base.z * heightScale + (Math.random() - 0.5) * 0.14;
            if (Math.abs(y) < 0.6 && Math.random() < 0.4) {
                x += (Math.random() - 0.5) * 0.2;
                z += (Math.random() - 0.5) * 0.2;
            }
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            let colorIdx = 0;
            const distToCenter = Math.sqrt(x*x + z*z);
            if (y > 0.8) colorIdx = 4;
            else if (y < -0.7) colorIdx = 2;
            else if (distToCenter < 0.6) colorIdx = 3;
            else colorIdx = Math.floor(Math.random() * 3);
            let col = colorPalette[colorIdx].clone();
            if (Math.random() > 0.7) col = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i*3] = col.r;
            colors[i*3+1] = col.g;
            colors[i*3+2] = col.b;
        }
        
        const heartGeometry = new THREE.BufferGeometry();
        heartGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        heartGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(16, 16, 8, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255,200,210,0.9)';
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        };
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.11,
            vertexColors: true,
            map: createParticleTexture(),
            transparent: true,
            opacity: 0.95,
            blending: THREE.AdditiveBlending
        });
        
        const heartParticles = new THREE.Points(heartGeometry, particleMaterial);
        scene.add(heartParticles);
        
        // --- 飘落花瓣 (玫瑰花瓣效果)---
        const petalCount = 800;
        const petalPositions = new Float32Array(petalCount * 3);
        const petalVelocities = [];
        for (let i = 0; i < petalCount; i++) {
            petalPositions[i*3] = (Math.random() - 0.5) * 8;
            petalPositions[i*3+1] = (Math.random() - 0.5) * 5 + 1;
            petalPositions[i*3+2] = (Math.random() - 0.5) * 10 - 2;
            petalVelocities.push({
                x: (Math.random() - 0.5) * 0.008,
                y: Math.random() * 0.01 + 0.005,
                z: (Math.random() - 0.5) * 0.008
            });
        }
        const petalGeometry = new THREE.BufferGeometry();
        petalGeometry.setAttribute('position', new THREE.BufferAttribute(petalPositions, 3));
        
        const createPetalTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            ctx.save();
            ctx.translate(16, 16);
            ctx.scale(1, 1.2);
            ctx.beginPath();
            ctx.ellipse(0, 0, 12, 16, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#ffb7c5';
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-2, -3, 4, 5, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#ff8da1';
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(3, -2, 3, 4, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#ffa5b9';
            ctx.fill();
            ctx.restore();
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        };
        
        const petalMaterial = new THREE.PointsMaterial({
            color: 0xff99bb,
            size: 0.12,
            map: createPetalTexture(),
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });
        const petals = new THREE.Points(petalGeometry, petalMaterial);
        scene.add(petals);
        
        // 金色星尘环绕
        const dustCount = 1500;
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const radius = 1.2 + Math.random() * 1.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = Math.sin(phi) * Math.cos(theta) * radius;
            const z = Math.sin(phi) * Math.sin(theta) * radius;
            const y = Math.cos(phi) * radius * 0.9;
            dustPositions[i*3] = x;
            dustPositions[i*3+1] = y;
            dustPositions[i*3+2] = z;
        }
        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xffccaa, size: 0.045, transparent: true, blending: THREE.AdditiveBlending });
        const dustRing = new THREE.Points(dustGeo, dustMat);
        scene.add(dustRing);
        
        // 爱心上方光晕 (Sprite)
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = 64;
        glowCanvas.height = 64;
        const gCtx = glowCanvas.getContext('2d');
        gCtx.beginPath();
        gCtx.arc(32, 32, 28, 0, 2*Math.PI);
        gCtx.fillStyle = '#ff99bb';
        gCtx.fill();
        gCtx.beginPath();
        gCtx.arc(32, 32, 16, 0, 2*Math.PI);
        gCtx.fillStyle = '#ffccdd';
        gCtx.fill();
        const glowTexture = new THREE.CanvasTexture(glowCanvas);
        const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.35 });
        const heartGlow = new THREE.Sprite(glowMaterial);
        heartGlow.scale.set(1.8, 1.8, 1);
        heartGlow.position.set(0, 0.2, -0.5);
        scene.add(heartGlow);
        
        // 【重要】移除遮挡爱心的圆环 groundRing（用户要求透明或删除），直接不添加即可
        // 之前代码中的 groundRing 已彻底移除，确保爱心完全可见
        
        // --- 轨道控制 (支持手机拖拽+缩放)---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0.2, 0);
        controls.maxPolarAngle = Math.PI / 1.8;
        controls.minDistance = 4;
        controls.maxDistance = 18;
        
        // 自动旋转 (无交互时缓慢转动)
        let idleTime = 0;
        let autoRotateFlag = false;
        let autoRotateTimer = null;
        const startAutoRotate = () => {
            if (autoRotateTimer) clearInterval(autoRotateTimer);
            autoRotateTimer = setInterval(() => {
                if (!controls.autoRotate && idleTime > 3000 && !controls.autoRotate) {
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 1.2;
                    autoRotateFlag = true;
                } else if (controls.autoRotate && (idleTime < 2000 || !autoRotateFlag)) {
                    controls.autoRotate = false;
                    autoRotateFlag = false;
                }
                idleTime += 100;
                if (idleTime > 10000) idleTime = 8000;
            }, 100);
        };
        startAutoRotate();
        controls.object.addEventListener('change', () => {
            idleTime = 0;
            if (controls.autoRotate) {
                controls.autoRotate = false;
                autoRotateFlag = false;
            }
        });
        
        // --- 动画: 飘落花瓣 & 星尘旋转 ---
        let time = 0;
        function animateParticles() {
            const positionsAttr = petals.geometry.attributes.position.array;
            for (let i = 0; i < petalCount; i++) {
                positionsAttr[i*3] += petalVelocities[i].x;
                positionsAttr[i*3+1] += petalVelocities[i].y;
                positionsAttr[i*3+2] += petalVelocities[i].z;
                if (positionsAttr[i*3+1] > 3.5 || positionsAttr[i*3+1] < -2.5 || Math.abs(positionsAttr[i*3]) > 6 || Math.abs(positionsAttr[i*3+2]) > 7) {
                    positionsAttr[i*3] = (Math.random() - 0.5) * 5;
                    positionsAttr[i*3+1] = (Math.random() - 0.5) * 3 + 0.5;
                    positionsAttr[i*3+2] = (Math.random() - 0.5) * 6 - 1;
                    petalVelocities[i] = {
                        x: (Math.random() - 0.5) * 0.008,
                        y: Math.random() * 0.012 + 0.004,
                        z: (Math.random() - 0.5) * 0.008
                    };
                }
            }
            petals.geometry.attributes.position.needsUpdate = true;
            dustRing.rotation.y += 0.003;
            dustRing.rotation.x = Math.sin(time * 0.5) * 0.1;
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            heartGlow.material.opacity = 0.4 + Math.sin(time * 1.5) * 0.15;
            time += 0.016;
        }
        
        // --- 歌词滚动 (浪漫520主题) ---
        const lyricsList = [
            "🌟 你一闪一闪的，照亮了我的世界 🌟"
        ];
        let lyricIndex = 0;
        const lyricElement = document.getElementById('lyricsText');
        
        function updateLyric() {
            if (!lyricElement) return;
            lyricElement.style.opacity = '0';
            lyricElement.style.transform = 'translateY(8px)';
            setTimeout(() => {
                lyricElement.textContent = lyricsList[lyricIndex];
                lyricElement.style.opacity = '1';
                lyricElement.style.transform = 'translateY(0)';
                lyricIndex = (lyricIndex + 1) % lyricsList.length;
            }, 300);
        }
        // 每3.5秒切换一句歌词
        setInterval(updateLyric, 3800);
        updateLyric(); // 立即显示第一句
        
        // --- 音乐控制 (移动端兼容)---
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;
        let audioUnlocked = false;
        
        function tryPlayMusic() {
            if (!audioUnlocked) {
                bgm.volume = 0.35;
                bgm.play().then(() => {
                    musicPlaying = true;
                    audioUnlocked = true;
                    musicBtn.innerHTML = '<i class="fas fa-music"></i>';
                }).catch(e => {
                    console.log("音乐需用户交互");
                    musicBtn.innerHTML = '<i class="fas fa-heart"></i>';
                });
            }
        }
        
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!audioUnlocked) {
                tryPlayMusic();
            } else {
                if (musicPlaying) {
                    bgm.pause();
                    musicPlaying = false;
                    musicBtn.innerHTML = '<i class="fas fa-heart-broken"></i>';
                } else {
                    bgm.play().then(() => {
                        musicPlaying = true;
                        musicBtn.innerHTML = '<i class="fas fa-music"></i>';
                    }).catch(()=>{});
                }
            }
        });
        
        const unlockAudioOnFirstTouch = () => {
            tryPlayMusic();
            document.removeEventListener('touchstart', unlockAudioOnFirstTouch);
            document.removeEventListener('click', unlockAudioOnFirstTouch);
        };
        document.addEventListener('touchstart', unlockAudioOnFirstTouch, { once: true });
        document.addEventListener('click', unlockAudioOnFirstTouch, { once: true });
        
        // 窗口适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 主渲染循环
        function render() {
            requestAnimationFrame(render);
            controls.update();
            animateParticles();
            effectComposer.render();
        }
        render();
        
        console.log("%c❤️ 5 2 0 浪漫爱心 · 歌词滚动 + 玫瑰星尘 ❤️", "color: #ff88aa; font-size: 15px;");
    </script>
</body>
</html>
